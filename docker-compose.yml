version: '3.8'

services:
  discbox:
    build: .
    image: discbox:latest
    container_name: discbox
    restart: unless-stopped

    # Port mapping
    ports:
      - "${PORT:-8767}:8767"

    # Environment variables
    environment:
      NODE_ENV: production
      DATABASE_URL: file:/app/config/discbox.db
      PORT: 8767
      
      # Last.fm Settings (optional, can be set via UI)
      LASTFM_API_KEY: ${LASTFM_API_KEY:-}
      LASTFM_SECRET: ${LASTFM_SECRET:-}
      LASTFM_USERNAME: ${LASTFM_USERNAME:-}
      
      # yt-dlp Download Settings
      MUSIC_OUTPUT_DIR: ${MUSIC_OUTPUT_DIR:-/music}
      AUDIO_FORMAT: ${AUDIO_FORMAT:-mp3}
      AUDIO_QUALITY: ${AUDIO_QUALITY:-320k}
      MAX_CONCURRENT_DOWNLOADS: ${MAX_CONCURRENT_DOWNLOADS:-2}
      SEARCH_PREFERENCE: ${SEARCH_PREFERENCE:-auto}
      
      # Sync Settings
      SYNC_INTERVAL: ${SYNC_INTERVAL:-360}
      SYNC_LOVED: ${SYNC_LOVED:-true}
      SYNC_ALBUMS: ${SYNC_ALBUMS:-true}
      SYNC_PLAYLISTS: ${SYNC_PLAYLISTS:-true}

    # Volume mounts
    volumes:
      # Config directory for SQLite database and persistent settings
      - /mnt/user/appdata/discbox:/app/config
      
      # Music output directory for downloaded tracks
      - ${MUSIC_PATH:-/mnt/user/Media/music}:/music

    # Logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8767/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
