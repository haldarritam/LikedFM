services:
  likedfm:
    build: .
    image: likedfm:latest
    container_name: likedfm
    restart: unless-stopped

    # Port mapping
    ports:
      - "${PORT:-8767}:8767"

    # Environment variables
    environment:
      NODE_ENV: production
      DATABASE_URL: file:/app/config/likedfm.db
      PORT: 8767
      
      # Last.fm Settings (optional, can be set via UI)
      LASTFM_API_KEY: ${LASTFM_API_KEY:-}
      LASTFM_SECRET: ${LASTFM_SECRET:-}
      LASTFM_USERNAME: ${LASTFM_USERNAME:-}
      
      # Lidarr Settings (optional, can be set via UI)
      LIDARR_URL: ${LIDARR_URL:-}
      LIDARR_API_KEY: ${LIDARR_API_KEY:-}
      
      # Sync Settings
      MUSIC_ROOT: ${MUSIC_ROOT:-/music}
      SYNC_INTERVAL: ${SYNC_INTERVAL:-360}

    # Volume mounts
    volumes:
      # Config directory for SQLite database and persistent settings
      - ./config:/app/config
      
      # Read-only mount to music library for download detection
      - ${MUSIC_PATH:-/mnt/user/music}:/music:ro

    # Logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    # Resource limits (optional, adjust based on your system)
    # deploy:
    #   resources:
    #     limits:
    #       cpus: '0.5'
    #       memory: 512M

networks:
  default:
    name: likedfm-network
    driver: bridge
